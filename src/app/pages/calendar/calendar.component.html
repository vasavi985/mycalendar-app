<div class="calendar-page">

  <!-- Header -->
  <div class="calendar-header">

  
    <div class="header-text">

      <h1>
        {{ currentMonth }}
        {{ currentYear }}
      </h1>

      <p>
        Track your cycle
      </p>

    </div>

    <button class="icon-btn">

      ❤

    </button>

  </div>

  <!-- Week Days -->
  <div class="week-days">

    <span>Sun</span>
    <span>Mon</span>
    <span>Tue</span>
    <span>Wed</span>
    <span>Thu</span>
    <span>Fri</span>
    <span>Sat</span>

  </div>

  <!-- Calendar -->
  <div class="calendar-grid">

    <div
      *ngFor="let day of days"
      class="day-box"

      [class.period]="
        isPeriodDay(day)
      "

      [class.fertile]="
        isFertileDay(day)
      "

      [class.ovulation]="
        isOvulationDay(day)
      "

      [class.today]="
        isToday(day)
      "

      (click)="selectDay(day)"
    >

      {{ day }}

    </div>

  </div>

  <!-- Legend -->
  <div class="legend">

    <div class="legend-item">

      <span class="pink-dot">
      </span>

      Period

    </div>

    <div class="legend-item">

      <span class="yellow-dot">
      </span>

      Fertile

    </div>

    <div class="legend-item">

      <span class="purple-dot">
      </span>

      Ovulation

    </div>

  </div>

  <!-- Prediction Card -->
  <div class="prediction-card">

    <h2>
      Cycle Prediction
    </h2>

    <div class="prediction-item">

      <span>
        Next Period
      </span>

      <strong>
        {{ nextPeriod }}
      </strong>

    </div>

    <div class="prediction-item">

      <span>
        Fertile Window
      </span>

      <strong>
        {{ fertileWindow }}
      </strong>

    </div>

    <div class="prediction-item">

      <span>
        Ovulation Day
      </span>

      <strong>
        {{ ovulationDay }}
      </strong>

    </div>

  </div>

</div>
